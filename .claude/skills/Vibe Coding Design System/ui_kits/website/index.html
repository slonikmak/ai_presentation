<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Coding — Website UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--slate-deep);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
  ::selection{background:var(--accent-tint);color:var(--accent-deep);}
  a{color:inherit;text-decoration:none;}
  .ico{display:inline-flex;align-items:center;justify-content:center;}
  .ico svg{width:1em;height:1em;stroke-width:1.75;}
  ::-webkit-scrollbar{width:12px;height:12px;}
  ::-webkit-scrollbar-track{background:var(--bg-soft);}
  ::-webkit-scrollbar-thumb{background:var(--slate-faint);border:3px solid var(--bg-soft);}
  .container{max-width:1240px;margin:0 auto;padding:0 40px;}
  .reveal{opacity:1;transform:none;}
  [data-animate] .reveal{animation:rise .6s var(--ease-out) both;}
  @keyframes rise{from{transform:translateY(16px);}to{transform:none;}}
  @keyframes blink{0%,49%{opacity:1;}50%,100%{opacity:0;}}
  .caret{display:inline-block;width:9px;height:1.05em;background:var(--accent);vertical-align:-2px;margin-left:2px;animation:blink 1.05s steps(1) infinite;}
  @media (prefers-reduced-motion:reduce){.reveal{animation:none;opacity:1;transform:none;}.caret{animation:none;}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ColorBlocks.jsx"></script>
<script type="text/babel" src="Metrics.jsx"></script>
<script type="text/babel" src="Capabilities.jsx"></script>
<script type="text/babel" src="Workflow.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  function App() {
    // re-render lucide icons after every paint
    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
    // only run entrance animations when the page is actually visible,
    // so backgrounded previews / print / the verifier always show content
    useEffect(() => {
      const trigger = () => { if (!document.hidden) document.body.setAttribute('data-animate', ''); };
      trigger();
      document.addEventListener('visibilitychange', trigger);
      return () => document.removeEventListener('visibilitychange', trigger);
    }, []);
    return (
      <React.Fragment>
        <Nav />
        <main>
          <Hero />
          <ColorBlocks />
          <Capabilities />
          <Workflow />
          <Metrics />
        </main>
        <Footer />
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

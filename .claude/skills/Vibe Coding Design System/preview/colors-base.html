<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .wrap{padding:26px 32px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{border:1px solid var(--line-2);border-radius:var(--r-xs);overflow:hidden;}
  .chip{height:72px;}
  .meta{padding:8px 10px;background:var(--bg);border-top:1px solid var(--line-1);}
  .n{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--slate-deep);}
  .h{font-family:var(--font-mono);font-size:11px;color:var(--slate-mut);margin-top:2px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#FFFFFF;border-bottom:1px solid var(--line-1)"></div><div class="meta"><div class="n">bg</div><div class="h">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#F4F5F7"></div><div class="meta"><div class="n">bg-soft</div><div class="h">#F4F5F7</div></div></div>
    <div class="sw"><div class="chip" style="background:#EDEFF2"></div><div class="meta"><div class="n">bg-tint</div><div class="h">#EDEFF2</div></div></div>
    <div class="sw"><div class="chip" style="background:#E3E6EA"></div><div class="meta"><div class="n">bg-line</div><div class="h">#E3E6EA</div></div></div>
  </div>
</div>
</body>
</html>

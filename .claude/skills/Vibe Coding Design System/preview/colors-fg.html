<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .wrap{padding:26px 32px;}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .sw{border:1px solid var(--line-2);border-radius:var(--r-xs);overflow:hidden;}
  .chip{height:64px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:22px;color:#fff;}
  .meta{padding:8px 10px;background:var(--bg);border-top:1px solid var(--line-1);}
  .n{font-family:var(--font-display);font-size:12.5px;font-weight:600;color:var(--slate-deep);}
  .h{font-family:var(--font-mono);font-size:10.5px;color:var(--slate-mut);margin-top:2px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#2B3340">Aa</div><div class="meta"><div class="n">slate-deep</div><div class="h">#2B3340</div></div></div>
    <div class="sw"><div class="chip" style="background:#3D4757">Aa</div><div class="meta"><div class="n">slate</div><div class="h">#3D4757</div></div></div>
    <div class="sw"><div class="chip" style="background:#5C6675">Aa</div><div class="meta"><div class="n">slate-soft</div><div class="h">#5C6675</div></div></div>
    <div class="sw"><div class="chip" style="background:#8A93A1">Aa</div><div class="meta"><div class="n">slate-mut</div><div class="h">#8A93A1</div></div></div>
    <div class="sw"><div class="chip" style="background:#C3C9D1">Aa</div><div class="meta"><div class="n">slate-faint</div><div class="h">#C3C9D1</div></div></div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .wrap{padding:30px 32px;display:flex;align-items:center;gap:30px;flex-wrap:wrap;}
  .word{font-family:var(--font-display);font-weight:800;font-size:30px;color:var(--slate-deep);letter-spacing:-.01em;}
  .word .sl{color:var(--accent);}
  .lock{display:flex;align-items:center;gap:12px;}
  .mark{width:40px;height:40px;display:block;}
  .div{width:1px;height:46px;background:var(--line-2);}
  .onslate{background:var(--slate-deep);padding:14px 20px;}
  .onslate .word{color:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <span class="word"><span class="sl">/</span>VIBE</span>
  <div class="div"></div>
  <div class="lock"><img class="mark" src="../assets/mark.svg" alt=""><span class="word"><span class="sl">/</span>VIBE<span style="font-weight:300;color:var(--slate-soft)">CODING</span></span></div>
  <div class="div"></div>
  <div class="onslate"><span class="word"><span class="sl">/</span>VIBE</span></div>
</div>
</body>
</html>

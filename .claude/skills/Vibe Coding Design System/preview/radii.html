<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .wrap{padding:26px 32px;display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap;}
  .item{text-align:center;}
  .box{width:78px;height:56px;background:var(--bg-tint);border:1px solid var(--line-2);}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--slate-mut);margin-top:8px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><div class="box" style="border-radius:0"></div><div class="lbl">none · 0</div></div>
  <div class="item"><div class="box" style="border-radius:2px"></div><div class="lbl">xs · 2</div></div>
  <div class="item"><div class="box" style="border-radius:3px"></div><div class="lbl">sm · 3</div></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">md · 4 (max)</div></div>
  <div style="font-family:var(--font-display);font-size:14px;color:var(--slate-soft);max-width:160px;text-align:left;line-height:1.4;">Sharp & architectural — corners stay square, like esprow.</div>
</div>
</body>
</html>

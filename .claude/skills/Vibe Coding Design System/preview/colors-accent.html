<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .wrap{padding:26px 32px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{border:1px solid var(--line-2);border-radius:var(--r-xs);overflow:hidden;}
  .chip{height:72px;}
  .meta{padding:8px 10px;background:var(--bg);border-top:1px solid var(--line-1);}
  .n{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--slate-deep);}
  .h{font-family:var(--font-mono);font-size:11px;color:var(--slate-mut);margin-top:2px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#E6006B"></div><div class="meta"><div class="n">accent</div><div class="h">#E6006B</div></div></div>
    <div class="sw"><div class="chip" style="background:#C2005A"></div><div class="meta"><div class="n">accent-deep</div><div class="h">#C2005A</div></div></div>
    <div class="sw"><div class="chip" style="background:#1F7FD6"></div><div class="meta"><div class="n">blue</div><div class="h">#1F7FD6</div></div></div>
    <div class="sw"><div class="chip" style="background:#149E91"></div><div class="meta"><div class="n">teal</div><div class="h">#149E91</div></div></div>
  </div>
  <div style="font-family:var(--font-mono);font-size:11px;color:var(--slate-mut);margin-top:14px;letter-spacing:.02em;">RASPBERRY-MAGENTA SIGNATURE · ONE ACCENT PER VIEW</div>
</div>
</body>
</html>

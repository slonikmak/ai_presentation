<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .wrap{padding:26px 32px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{border:1px solid var(--line-2);border-radius:var(--r-xs);overflow:hidden;}
  .chip{height:50px;display:flex;align-items:center;padding-left:14px;font-family:var(--font-mono);font-size:13px;font-weight:600;color:#fff;}
  .meta{padding:7px 10px;background:var(--bg);border-top:1px solid var(--line-1);}
  .n{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--slate-deep);}
  .h{font-family:var(--font-mono);font-size:11px;color:var(--slate-mut);margin-top:2px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#1E9E6A">✓</div><div class="meta"><div class="n">success</div><div class="h">#1E9E6A</div></div></div>
    <div class="sw"><div class="chip" style="background:#1F7FD6">i</div><div class="meta"><div class="n">info</div><div class="h">#1F7FD6</div></div></div>
    <div class="sw"><div class="chip" style="background:#E8920C">!</div><div class="meta"><div class="n">warn</div><div class="h">#E8920C</div></div></div>
    <div class="sw"><div class="chip" style="background:#DD3030">×</div><div class="meta"><div class="n">danger</div><div class="h">#DD3030</div></div></div>
  </div>
</div>
</body>
</html>

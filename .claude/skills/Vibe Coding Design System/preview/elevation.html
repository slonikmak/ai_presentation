<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .wrap{padding:30px 32px;display:flex;gap:26px;align-items:center;flex-wrap:wrap;}
  .item{text-align:center;}
  .box{width:130px;height:78px;background:#fff;border:1px solid var(--line-1);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--slate-mut);}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--slate-mut);margin-top:10px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><div class="box" style="box-shadow:0 1px 2px rgba(43,51,64,0.06)">sm</div><div class="lbl">shadow-sm · cards</div></div>
  <div class="item"><div class="box" style="box-shadow:0 6px 20px rgba(43,51,64,0.10)">md</div><div class="lbl">shadow-md · hover</div></div>
  <div class="item"><div class="box" style="box-shadow:0 18px 50px rgba(43,51,64,0.16)">lg</div><div class="lbl">shadow-lg · overlays</div></div>
</div>
</body>
</html>

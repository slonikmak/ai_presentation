<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .wrap{padding:26px 32px;}
  .row{display:flex;align-items:center;gap:14px;padding:6px 0;}
  .bar{height:16px;background:var(--accent-tint);border:1px solid var(--accent);border-radius:1px;}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--slate-mut);min-width:84px;}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--slate-soft);}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="lbl">s-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
  <div class="row"><span class="lbl">s-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
  <div class="row"><span class="lbl">s-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
  <div class="row"><span class="lbl">s-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
  <div class="row"><span class="lbl">s-5</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
  <div class="row"><span class="lbl">s-6</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
  <div class="row"><span class="lbl">s-7</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
  <div class="row"><span class="lbl">s-8</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
  <div class="row"><span class="lbl">s-9 · s-10</span><div class="bar" style="width:96px"></div><span class="px">96 / 128</span></div>
</div>
</body>
</html>

<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .wrap{padding:24px 32px;}
  .row{display:flex;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px solid var(--line-1);}
  .row:last-child{border-bottom:0;}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--slate-mut);letter-spacing:.04em;min-width:112px;flex-shrink:0;text-transform:uppercase;}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="tag">Kicker</span><span class="t-kicker">What changed</span></div>
  <div class="row"><span class="tag">Label</span><span class="t-label">Solutions</span></div>
  <div class="row"><span class="tag">Lead / 21</span><span class="t-lead">AI drafts the first 80%. We focus on the 20% that's hard.</span></div>
  <div class="row"><span class="tag">Body / 17</span><span class="t-body">A humanist grotesque — light for the lead clause, bold for the turn.</span></div>
  <div class="row"><span class="tag">Mono / 14</span><span class="t-mono">$ vibe review ./src</span></div>
  <div class="row"><span class="tag">Code</span><span class="t-body">Run <span class="t-code">git rebase -i</span> then ship.</span></div>
</div>
</body>
</html>

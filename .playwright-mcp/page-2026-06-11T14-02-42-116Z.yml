            - paragraph [ref=e513]: "Кандидат в инструкцию: перед написанием parsing/split-тестов снять реальные runtime-данные (в этом случае — фактические bookmark labels из одного снапшота) и строить тесты от них, а не от воображаемых примеров."
            - heading "Финальный фикс нарушил собственный spec, и spec не обновили" [level=3] [ref=e514]
            - paragraph [ref=e515]:
              - text: "В Validation Contract написано: \"spacing must be controlled by DOM structure and CSS, not by hard-coded literal spaces\". Итоговый fallback — ровно hard-coded"
              - code [ref=e516]: "&nbsp;"
              - text: в строке. Решение правильное, реальность заставила — но spec теперь врет следующему читателю. Documentation-first работает, только если документы догоняют отклонения.
            - paragraph [ref=e517]: "Кандидат в инструкцию: если реализация отклонилась от контракта в spec — обновить spec в том же цикле, что и код."
            - heading "Саморефлексии не должны умирать в квадратных скобках" [level=3] [ref=e518]
            - paragraph [ref=e519]: Агент сгенерировал десять наблюдений и несколько идей скиллов — но они остались текстом внутри дневника. Цикл "сессия -> рефлексия -> новый скилл -> следующая сессия дешевле" замыкается, только если есть шаг превращения рефлексий в скиллы или инструкции.
            - paragraph [ref=e520]: "Улучшение процесса: после сессии собирать блоки саморефлексии и явно решать по каждому — становится скиллом, становится инструкцией или отбрасывается. Хорошо, если агент сам предлагает такие улучшения по итогам рефлексии."
            - heading "Успех не задокументирован так же, как провал" [level=3] [ref=e521]
            - paragraph [ref=e522]: В артефактах есть скриншот сломанного ToC, но нет эталонного скриншота правильного результата. QA получил описание словами ("clearly increased gap"). Финальное "вроде ок" от человека — самое слабое подтверждение во всей сессии, контрастирующее со строгостью остальных проверок.
            - paragraph [ref=e523]: "Кандидат в инструкцию: при визуальных проверках сохранять в task folder не только провальные, но и эталонные снимки — отчет для QA тогда становится сравнением с эталоном."
            - heading "Вывод второго уровня" [level=3] [ref=e524]
            - paragraph [ref=e525]: "Агент внутри сессии видит, где не хватило скилла. Снаружи видно другое: где проверочный набор был синтетическим, где документы разошлись с кодом, куда деваются сами рефлексии. Поэтому рефлексия над сессией — тоже часть процесса \"человек + агент\": она дешевая, делается другим агентом по готовым артефактам и возвращает улучшения в скиллы и инструкции."

            - 'heading "/ 13. Внешняя рефлексия: взгляд второго агента" [level=2] [ref=e501]'
            - paragraph [ref=e502]: Этот раздел написан другим агентом, который не участвовал в сессии, а читал ее артефакты снаружи. Саморефлексия внутри сессии видит тактические улучшения; некоторые системные вещи видны только при взгляде со стороны. Все наблюдения ниже — про улучшение связки "человек + агент", и каждое сформулировано так, чтобы его можно было превратить в скилл или инструкцию.
            - heading "У двух регрессий общий корень" [level=3] [ref=e503]
            - paragraph [ref=e504]:
              - text: "\"Старый CSS без новых селекторов\" и \"старый шаблон с"

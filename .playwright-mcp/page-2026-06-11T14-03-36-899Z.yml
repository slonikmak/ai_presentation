            - 'heading "/ 13. Внешняя рефлексия: взгляд второго агента" [level=2] [ref=e407]'
            - paragraph [ref=e408]: Этот раздел написан другим агентом, который не участвовал в сессии, а читал ее артефакты снаружи. Саморефлексия внутри сессии видит тактические улучшения; некоторые системные вещи видны только при взгляде со стороны. Все наблюдения ниже — про улучшение связки "человек + агент", и каждое сформулировано так, чтобы его можно было превратить в скилл или инструкцию.

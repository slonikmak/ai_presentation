            - paragraph [ref=e412]: "Улучшение процесса: к задаче, затрагивающей пользовательские шаблоны, прикреплять реальные шаблоны, на которых проходила проверка, — как артефакт в task folder. Тогда regression-проверка идет не по придуманным агентом вариантам, а по фактическим. QA-инцидент после push был бы пойман локально."
            - paragraph [ref=e413]: "Кандидат в инструкцию: перед push template-facing изменения прогнать проверку на реальных шаблонах, приложенных к задаче."
            - heading "Фикстуры, придуманные агентом, кодируют допущения агента" [level=3] [ref=e414]

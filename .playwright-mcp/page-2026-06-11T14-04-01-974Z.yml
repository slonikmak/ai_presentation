            - paragraph [ref=e874]: "Кандидат в инструкцию: перед написанием parsing/split-тестов снять реальные runtime-данные (в этом случае — фактические bookmark labels из одного снапшота) и строить тесты от них, а не от воображаемых примеров."
            - heading "Финальный фикс нарушил собственный spec, и spec не обновили" [level=3] [ref=e875]
            - paragraph [ref=e876]:
              - text: "В Validation Contract написано: \"spacing must be controlled by DOM structure and CSS, not by hard-coded literal spaces\". Итоговый fallback — ровно hard-coded"
